name: Codeine-Dreams CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  export:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    # ---------------------------------------------------------
    # Download Godot Headless AppImage (small, reliable)
    # ---------------------------------------------------------
    - name: Download Godot Headless AppImage
      run: |
        wget https://github.com/godotengine/godot-builds/releases/download/4.2.1-stable/Godot_v4.2.1-stable_linux_headless.64.zip
        unzip Godot_v4.2.1-stable_linux_headless.64.zip
        chmod +x Godot_v4.2.1-stable_linux_headless.64

    # ---------------------------------------------------------
    # Export Windows build (no templates needed)
    # ---------------------------------------------------------
    - name: Export Windows build
      run: |
        mkdir -p build/windows
        ./Godot_v4.2.1-stable_linux_headless.64 --headless --export-release "Windows Desktop" build/windows/CodeineDreams.exe

    # ---------------------------------------------------------
    # Export Linux build (no templates needed)
    # ---------------------------------------------------------
    - name: Export Linux build
      run: |
        mkdir -p build/linux
        ./Godot_v4.2.1-stable_linux_headless.64 --headless --export-release "Linux/X11" build/linux/CodeineDreams.x86_64

    # ---------------------------------------------------------
    # Upload artifacts
    # ---------------------------------------------------------
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: Codeine-Dreams-Builds
        path: build/
