name: Codeine-Dreams CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  export:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    # ---------------------------------------------------------
    # Install Godot from Ubuntu repos (works, no PPA needed)
    # ---------------------------------------------------------
    - name: Install Godot
      run: |
        sudo apt-get update
        sudo apt-get install -y godot3

    # ---------------------------------------------------------
    # Export Windows build
    # ---------------------------------------------------------
    - name: Export Windows build
      run: |
        mkdir -p build/windows
        godot3 --headless --export-release "Windows Desktop" build/windows/CodeineDreams.exe

    # ---------------------------------------------------------
    # Export Linux build
    # ---------------------------------------------------------
    - name: Export Linux build
      run: |
        mkdir -p build/linux
        godot3 --headless --export-release "Linux/X11" build/linux/CodeineDreams.x86_64

    # ---------------------------------------------------------
    # Upload artifacts
    # ---------------------------------------------------------
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: Codeine-Dreams-Builds
        path: build/
