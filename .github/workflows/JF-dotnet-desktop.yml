name: Oasis Windows Build

on:
  push:
    branches: ["main"]        # Runs automatically when you push to main
  workflow_dispatch:          # Lets you run it manually

jobs:
  build:
    runs-on: windows-latest   # Use Windows runner

    steps:
      # 1. Download your repo into the runner
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Show where GitHub put your files (helps with debugging)
      - name: Debug workspace
        run: |
          echo "Workspace root:"
          echo ${{ github.workspace }}
          echo "Listing workspace:"
          dir ${{ github.workspace }}

      # 3. Install Node.js
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      # 4. Install npm packages inside your Oasis folder
      - name: Install dependencies
        run: npm install

      # 5. Build your project
      - name: Build project
        run: npm run build

      # 6. Make sure the Windows build folder exists
      - name: Verify build output
        run: |
          if (!(Test-Path "${{ github.workspace }}\Oasis\build\windows")) {
            echo "❌ Build folder missing"
            exit 1
          } else {
            echo "✅ Build folder found"
            dir ${{ github.workspace }}\Oasis\build\windows
          }

      # 7. Upload your Windows build as an artifact
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: oasis-build-win
          path: ${{ github.workspace }}\Oasis\build\windows\
