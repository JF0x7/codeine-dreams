jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install
        working-directory: codeine-dreams

      - name: Build project
        run: npm run build
        working-directory: codeine-dreams

      - name: Verify build output
        run: |
          if (!(Test-Path "codeine-dreams/build/windows")) {
            echo "❌ Build folder missing"
            exit 1
          } else {
            echo "✅ Build folder found"
            dir codeine-dreams/build/windows
          }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: oasis-build-win
          path: codeine-dreams/build/windows/
