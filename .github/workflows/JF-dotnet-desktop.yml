name: Oasis Windows Build

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install
        working-directory: ${{ github.workspace }}

      - name: Build project
        run: npm run build
        working-directory: ${{ github.workspace }}

      - name: Verify build output
        run: |
          if (!(Test-Path "${{ github.workspace }}\build\windows")) {
            echo "❌ Build folder missing"
            exit 1
          } else {
            echo "✅ Build folder found"
            dir ${{ github.workspace }}\build\windows
          }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: oasis-build-win
          path: ${{ github.workspace }}\build\windows\
