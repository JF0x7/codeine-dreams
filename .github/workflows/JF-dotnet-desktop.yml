name: Codeine-Dreams CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  export-windows:
    runs-on: self-hosted

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Create build folders
      shell: powershell
      run: |
        New-Item -ItemType Directory -Force -Path "codeine-dreams/codeine-dreams/build/windows" | Out-Null

    - name: Export Windows build
      shell: powershell
      run: |
        & "C:\Users\jerem\Downloads\JmoneyGodot_v4.8-dev1_win64.exe" `
          --headless `
          --path "C:\Users\jerem\actions-runner\JFgitWork\codeine-dreams\codeine-dreams" `
          --export-release "Windows Desktop" `
          "codeine-dreams/codeine-dreams/build/windows/CodeineDreams.exe"

    - name: Verify Windows build exists
      shell: powershell
      run: |
        Write-Host "Checking codeine-dreams/codeine-dreams/build/windows directory..."
        Get-ChildItem -Path "codeine-dreams/codeine-dreams/build/windows"

    - name: Upload Windows artifact
      uses: actions/upload-artifact@v4
      with:
        name: windows-build
        path: codeine-dreams/codeine-dreams/build/windows/

  publish-container:
    runs-on: ubuntu-latest
    needs: export-windows

    permissions:
      contents: read
      packages: write

    steps:
    - name: Download Windows artifact
      uses: actions/download-artifact@v4
      with:
        name: windows-build
        path: build/

    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build container image
      run: |
        docker build \
          -t ghcr.io/jf0x7/codeine-dreams:${{ github.ref_name }} \
          .

    - name: Push container image
      run: |
        docker push ghcr.io/jf0x7/codeine-dreams:${{ github.ref_name }}
