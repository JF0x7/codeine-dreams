name: Codeine-Dreams CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  export:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    # ---------------------------------------------------------
    # Install Flatpak + Godot Headless
    # ---------------------------------------------------------
    - name: Install Godot Headless via Flatpak
      run: |
        sudo apt-get update
        sudo apt-get install -y flatpak
        flatpak remote-add --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
        flatpak install -y flathub org.godotengine.Godot4.Headless

    # ---------------------------------------------------------
    # Export Windows build
    # ---------------------------------------------------------
    - name: Export Windows build
      run: |
        mkdir -p build/windows
        flatpak run org.godotengine.Godot4.Headless --headless --export-release "Windows Desktop" build/windows/CodeineDreams.exe

    # ---------------------------------------------------------
    # Export Linux build
    # ---------------------------------------------------------
    - name: Export Linux build
      run: |
        mkdir -p build/linux
        flatpak run org.godotengine.Godot4.Headless --headless --export-release "Linux/X11" build/linux/CodeineDreams.x86_64

    # ---------------------------------------------------------
    # Upload artifacts
    # ---------------------------------------------------------
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: Codeine-Dreams-Builds
        path: build/
