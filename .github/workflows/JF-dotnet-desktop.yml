name: Oasis Windows Build

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    # ⭐ Force GitHub to use your REAL project directory on C:
    defaults:
      run:
        working-directory: C:\Users\jerem\actions-runner\JFgitWork\codeine-dreams\Oasis

    steps:
      # 1. Pull your repo
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Debug (shows your real folder)
      - name: Debug workspace
        run: |
          echo "Using forced working directory:"
          echo "C:\Users\jerem\actions-runner\JFgitWork\codeine-dreams\Oasis"
          dir .

      # 3. Install Node
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      # 4. Install npm packages
      - name: Install dependencies
        run: npm install

      # 5. Build your project
      - name: Build project
        run: npm run build

      # 6. Verify build output
      - name: Verify build output
        run: |
          if (!(Test-Path "build/windows")) {
            echo "❌ Build folder missing"
            exit 1
          } else {
            echo "✅ Build folder found"
            dir build/windows
          }

      # 7. Upload artifact
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: oasis-build-win
          path: build/windows/
