name: Oasis Multi-OS Build

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
        include:
          - os: windows-latest
            os-short: win
          - os: ubuntu-latest
            os-short: linux
          - os: macos-latest
            os-short: mac

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install deps
        run: npm install

      - name: Build
        run: npm run build

      - name: Verify build output
        run: |
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            dir build/windows
          else
            ls -R build/windows || exit 1
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: oasis-build-${{ matrix.os-short }}
          path: build/windows/

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: List artifacts
        run: ls -R ./artifacts

      - name: Deploy
        uses: actions/deploy-pages@v4
