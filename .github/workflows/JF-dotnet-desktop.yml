name: Codeine-Dreams CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  export:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Download Godot
      run: |
        curl -L -o Godot_v4.2.1-stable_linux_headless.64.zip https://github.com/godotengine/godot-builds/releases/download/4.2.1-stable/Godot_v4.2.1-stable_linux_headless.64.zip
        unzip Godot_v4.2.1-stable_linux_headless.64.zip
        sudo mv Godot_v4.2.1-stable_linux_headless.64 /usr/local/bin/godot

    - name: Download export templates
      run: |
        curl -L -o Godot_v4.2.1-stable_export_templates.tpz https://github.com/godotengine/godot-builds/releases/download/4.2.1-stable/Godot_v4.2.1-stable_export_templates.tpz
        mkdir -p ~/.local/share/godot/export_templates/4.2.1.stable
        tar -xf Godot_v4.2.1-stable_export_templates.tpz -C ~/.local/share/godot/export_templates/4.2.1.stable

    - name: Export Windows build
      run: |
        mkdir -p build/windows
        godot --headless --export-release "Windows Desktop" build/windows/CodeineDreams.exe

    - name: Export Linux build
      run: |
        mkdir -p build/linux
        godot --headless --export-release "Linux/X11" build/linux/CodeineDreams.x86_64

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: Codeine-Dreams-Builds
        path: build/
