name: Codeine-Dreams CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  export:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    # ---------------------------------------------------------
    # Download Godot AppImage (this URL works)
    # ---------------------------------------------------------
    - name: Download Godot AppImage
      run: |
        wget https://downloads.tuxfamily.org/godotengine/4.2.1/Godot_v4.2.1-stable_x86_64.AppImage
        chmod +x Godot_v4.2.1-stable_x86_64.AppImage

    # ---------------------------------------------------------
    # Export Windows build (auto-downloads templates)
    # ---------------------------------------------------------
    - name: Export Windows build
      run: |
        mkdir -p build/windows
        ./Godot_v4.2.1-stable_x86_64.AppImage --headless --export-release "Windows Desktop" build/windows/CodeineDreams.exe

    # ---------------------------------------------------------
    # Export Linux build (auto-downloads templates)
    # ---------------------------------------------------------
    - name: Export Linux build
      run: |
        mkdir -p build/linux
        ./Godot_v4.2.1-stable_x86_64.AppImage --headless --export-release "Linux/X11" build/linux/CodeineDreams.x86_64

    # ---------------------------------------------------------
    # Upload artifacts
    # ---------------------------------------------------------
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: Codeine-Dreams-Builds
        path: build/
