name: Codeine-Dreams CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  export:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Export Windows build
      uses: firebelley/godot-export@v5
      with:
        godot-version: "4.2.1"
        export-preset: "Windows Desktop"
        output-path: "build/windows/CodeineDreams.exe"

    - name: Export Linux build
      uses: firebelley/godot-export@v5
      with:
        godot-version: "4.2.1"
        export-preset: "Linux/X11"
        output-path: "build/linux/CodeineDreams.x86_64"

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: Codeine-Dreams-Builds
        path: build/
