name: Codeine-Dreams CI (Windows)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  export-windows:
    runs-on: self-hosted

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Create build folders
      shell: powershell
      run: |
        New-Item -ItemType Directory -Force -Path "build/windows" | Out-Null

    - name: Export Windows build
      shell: powershell
      run: |
        & "C:\Users\jerem\Downloads\JmoneyGodot_v4.8-dev1_win64.exe" `
          --headless `
          --export-release "Windows Desktop" `
          "build/windows/CodeineDreams.exe"

    - name: Upload Windows artifact
      uses: actions/upload-artifact@v4
      with:
        name: Codeine-Dreams-Windows
        path: build/windows

  publish-container:
    runs-on: ubuntu-latest
    needs: export-windows

    permissions:
      contents: read
      packages: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build container image
      run: |
        docker build -t ghcr.io/${{ github.repository_owner }}/codeine-dreams:${{ github.ref_name }} .

    - name: Push container image
      run: |
        docker push ghcr.io/${{ github.repository_owner }}/codeine-dreams:${{ github.ref_name }}
