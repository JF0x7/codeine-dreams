name: Codeine-Dreams CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  export:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    # ---------------------------------------------------------
    # Install Godot from apt (no downloads, no timeouts)
    # ---------------------------------------------------------
    - name: Install Godot Headless
      run: |
        sudo add-apt-repository ppa:godotengine/ppa -y
        sudo apt-get update
        sudo apt-get install -y godot4-headless godot4-export-templates

    # ---------------------------------------------------------
    # Export Windows build
    # ---------------------------------------------------------
    - name: Export Windows build
      run: |
        mkdir -p build/windows
        godot4 --headless --export-release "Windows Desktop" build/windows/CodeineDreams.exe

    # ---------------------------------------------------------
    # Export Linux build
    # ---------------------------------------------------------
    - name: Export Linux build
      run: |
        mkdir -p build/linux
        godot4 --headless --export-release "Linux/X11" build/linux/CodeineDreams.x86_64

    # ---------------------------------------------------------
    # Upload artifacts to GitHub
    # ---------------------------------------------------------
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: Codeine-Dreams-Builds
        path: build/
