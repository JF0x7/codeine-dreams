name: Oasis Windows Build

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest     # Docker works best on Linux runners

    steps:
      # ---------------------------------------------------------
      # 1. Pull your repository files
      # ---------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # ---------------------------------------------------------
      # 2. Export Windows build using Godot inside Docker
      # ---------------------------------------------------------
      - name: Export Windows Build (Godot Docker)
        run: |
          mkdir -p ${{ github.workspace }}/Oasis/build/windows
          docker run --rm \
            -v ${{ github.workspace }}/Oasis:/project \
            barichello/godot-ci:4.2.1 \
            --headless --export-release "Windows Desktop" /project/build/windows/Oasis.exe

      # ---------------------------------------------------------
      # 3. Upload the Windows build
      # ---------------------------------------------------------
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: oasis-build-win
          path: Oasis/build/windows/
