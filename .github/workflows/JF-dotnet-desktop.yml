name: Codeine-Dreams CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  export:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Godot
      uses: barichello/godot-ci@v4
      with:
        version: "4.2.1"
        export_templates: true

    - name: Export Windows build
      run: |
        mkdir -p build/windows
        godot --headless --export-release "Windows Desktop" build/windows/CodeineDreams.exe

    - name: Export Linux build
      run: |
        mkdir -p build/linux
        godot --headless --export-release "Linux/X11" build/linux/CodeineDreams.x86_64

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: Codeine-Dreams-Builds
        path: build/
