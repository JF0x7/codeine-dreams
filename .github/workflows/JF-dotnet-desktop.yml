name: Codeine-Dreams CI

on:
  push:
    branches: [ "main" ]

jobs:
  export:
    runs-on: self-hosted

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Export Windows build
      run: |
        mkdir build
        mkdir build/windows
        "C:\Users\jerem\Godot\Godot_v4.2.1-stable_win64.exe" --headless --export-release "Windows Desktop" build/windows/CodeineDreams.exe

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: Codeine-Dreams-Windows
        path: build/windows
